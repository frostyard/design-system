<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-sans);background:var(--gradient-page);background-color:var(--ink);color:var(--text-body);padding:20px 24px}a{color:var(--link);text-decoration:none}a:hover{color:var(--link-hover)}@keyframes energy-flow{to{stroke-dashoffset:-22}}.energy{fill:none;stroke:#8ee3ff;stroke-width:1.4;stroke-dasharray:3 8;filter:drop-shadow(0 0 2px #78dfff);animation:energy-flow 1.8s linear infinite}.cap{font:.62rem var(--font-mono);color:var(--text-eyebrow);margin-top:8px}</style></head><body>
<div style="display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:24px;align-items:start">
<div><div style="height:96px;border:1px solid var(--line);overflow:hidden;position:relative"><img src="../assets/hero/moonlit-summit.png" style="width:100%;height:220%;object-fit:cover;object-position:50% 62%;display:block"></div><div class="cap">alpine ridgeline — crop the hero series, never redraw it</div></div>
<div><svg viewBox="0 0 180 96" style="width:100%;height:96px;border:1px solid var(--line);background:var(--gradient-panel)"><path class="energy" d="M 14 30 H 96"></path><path class="energy" d="M 14 48 H 60 V 72 H 128"></path><path d="M 128 30 h 38 M 96 72 h 44" style="fill:none;stroke:#6bcaf0;stroke-dasharray:4 5;stroke-width:1.3"></path></svg><div class="cap">energy + layer lines — dashed, flowing, cyan</div></div>
<div><svg viewBox="0 0 180 96" style="width:100%;height:96px;border:1px solid var(--line);background:#081b2d"><g style="stroke:#9adfff2e;fill:none;stroke-width:1"><path d="M30 18 l14 8 v16 l-14 8 -14 -8 v-16 z"></path><path d="M58 34 l14 8 v16 l-14 8 -14 -8 v-16 z"></path><path d="M86 18 l14 8 v16 l-14 8 -14 -8 v-16 z"></path><path d="M114 34 l14 8 v16 l-14 8 -14 -8 v-16 z"></path><path d="M142 18 l14 8 v16 l-14 8 -14 -8 v-16 z"></path></g><rect x="70" y="60" width="7" height="7" style="fill:#b8f0ff" transform="rotate(45 73 63)"></rect><rect x="130" y="70" width="5" height="5" style="fill:#b8f0ff" transform="rotate(45 132 72)"></rect></svg><div class="cap">hex lattice + glowing crystals — faded, near-threshold</div></div>
</div>
<div style="display:flex;gap:40px;align-items:baseline;margin-top:18px;border-top:1px solid var(--line);padding-top:14px">
<div style="font-size:1.5rem;color:var(--ice)">✦ ↗ ↓ →<span class="cap" style="margin-left:12px;font-size:.62rem">glyph icon set</span></div>
<div style="font:.72rem var(--font-mono);color:var(--sky)">01 02 03<span class="cap" style="margin-left:12px;font-size:.62rem">mono sequence markers</span></div>
<div style="flex:1"><div style="height:1px;background:var(--gradient-ice-line)"></div><div class="cap">ice line fade</div></div>
</div>
</body></html>
