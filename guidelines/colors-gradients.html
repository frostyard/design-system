<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-sans);background:var(--gradient-page);background-color:var(--ink);color:var(--text-body);padding:20px 24px}a{color:var(--link);text-decoration:none}a:hover{color:var(--link-hover)}</style></head><body><div style="display:flex;gap:12px"><div style="flex:1;min-width:100px"><div style="height:64px;background:linear-gradient(135deg,#5ac9f7,#1584ca);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px;color:var(--text-body)">--gradient-primary</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">buttons</div></div><div style="flex:1;min-width:100px"><div style="height:64px;background:linear-gradient(160deg,#0f3048,#091c2d 62%);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px;color:var(--text-body)">--gradient-card</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">cards</div></div><div style="flex:1;min-width:100px"><div style="height:64px;background:linear-gradient(160deg,#17445e,#0a1f31 64%);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px;color:var(--text-body)">--gradient-card-alt</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">card variant</div></div><div style="flex:1;min-width:100px"><div style="height:64px;background:linear-gradient(135deg,#0d2d45,#071827);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px;color:var(--text-body)">--gradient-panel</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">panels/maps</div></div><div style="flex:1;min-width:100px"><div style="height:64px;background:linear-gradient(135deg,#0f3b58,#0b2034);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px;color:var(--text-body)">--gradient-signal</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">signal band</div></div></div>
