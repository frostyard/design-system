<!-- @dsCard group="Colors" viewport="700x160" name="State Colors" subtitle="Admin-surface states — cold-shifted, intentional additions" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-sans);background:var(--gradient-page);background-color:var(--ink);color:var(--text-body);padding:20px 24px}a{color:var(--link)}a:hover{color:var(--link-hover)}.b{border:1px solid;display:inline-flex;font:700 9px var(--font-mono);letter-spacing:.08em;padding:4px 7px;text-transform:uppercase;border-radius:2px}</style></head><body>
<div style="display:flex;gap:12px">
<div style="flex:1"><div style="height:52px;background:var(--state-ok);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px">--state-ok</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">#7edafa</div></div>
<div style="flex:1"><div style="height:52px;background:var(--state-warn);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px">--state-warn</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">#e0b15c</div></div>
<div style="flex:1"><div style="height:52px;background:var(--state-danger);border:1px solid var(--line)"></div><div style="font:600 .72rem var(--font-mono);margin-top:6px">--state-danger</div><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">#e07a72</div></div>
<div style="flex:1.4;display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap;padding-top:8px"><span class="b" style="border-color:#47b8ef4d;color:var(--state-ok)">merged</span><span class="b" style="border-color:#e0b15c55;color:var(--state-warn)">update</span><span class="b" style="border-color:#e07a7255;color:var(--state-danger)">failed</span><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow);width:100%">badge usage — hairline chips, never filled</div></div>
</div></body></html>
