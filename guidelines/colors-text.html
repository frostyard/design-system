<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-sans);background:var(--gradient-page);background-color:var(--ink);color:var(--text-body);padding:20px 24px}a{color:var(--link);text-decoration:none}a:hover{color:var(--link-hover)}</style></head><body><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px 24px">
<div><span style="color:#edf8ff;font-weight:650">Body — #edf8ff</span></div>
<div><span style="color:#b6d0df">Muted — #b6d0df</span></div>
<div><span style="color:#a6c1d0">Dim — #a6c1d0</span></div>
<div><span style="color:#82b6d0;font:700 .7rem var(--font-sans);text-transform:uppercase;letter-spacing:.17em">Eyebrow — #82b6d0</span></div>
<div><span style="color:#7799ab;font-size:.8rem">Footer — #7799ab</span></div>
<div><span style="color:#8ddbf8;font-family:var(--font-mono);font-size:.78rem">mono accent — #8ddbf8</span></div>
<div><span style="color:#8eddf9">Link — #8eddf9</span></div>
<div><span style="color:#aee9ff">Link hover / ice — #aee9ff</span></div>
<div><span style="color:#b9e9fb;font-size:.72rem;border:1px solid var(--line-tag);padding:2px 6px;border-radius:2px">tag — #b9e9fb</span></div>
</div></body></html>
