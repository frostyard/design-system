<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-sans);background:var(--gradient-page);background-color:var(--ink);color:var(--text-body);padding:20px 24px}a{color:var(--link);text-decoration:none}a:hover{color:var(--link-hover)}</style></head><body><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)">

</div>
