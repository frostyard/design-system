<!-- @dsCard group="Colors" viewport="700x160" name="Hairlines & Borders" subtitle="1px hairlines do all separation" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;font-family:var(--font-sans);background:var(--gradient-page);background-color:var(--ink);color:var(--text-body);padding:20px 24px}a{color:var(--link);text-decoration:none}a:hover{color:var(--link-hover)}</style></head><body><div style="border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr 1fr">
<div style="padding:14px 16px 14px 0"><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">--line</div><div style="font-size:.78rem;color:var(--text-muted)">rgba(162,222,255,.18)</div></div>
<div style="padding:14px 16px;border-left:1px solid var(--line)"><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">--line-strong</div><div style="font-size:.78rem;color:var(--text-muted)">#2c6380 — panel edges</div></div>
<div style="padding:14px 16px;border-left:1px solid var(--line)"><div style="font:.65rem var(--font-mono);color:var(--text-eyebrow)">--line-tag</div><div style="font-size:.78rem;color:var(--text-muted)">#a6dffa38 — tag borders</div></div>
</div>
<div style="margin-top:14px;font-size:.78rem;color:var(--text-dim)">Column dividers, row rules, card edges, section separators — always 1px, never heavier.</div></body></html>
